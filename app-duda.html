<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanaka News 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sakura: #FFF5F7;
  --primary: #D44D7D;
  --accent: #E0BBE4;
  --text: #4A5568;
  --shadow: 0 4px 15px rgba(212, 77, 125, 0.1);
}
body { font-family: 'Poppins', sans-serif; background: var(--sakura); color: var(--text); margin: 0; padding-bottom: 50px; }

.header {
  background: linear-gradient(135deg, #FFB7C5 0%, var(--accent) 100%);
  padding: 15px 20px;
  display: flex;
  align-items: center;
  box-shadow: var(--shadow);
  border-radius: 0 0 20px 20px;
  margin-bottom: 20px;
}
.kurama-icon { font-size: 40px; margin-right: 15px; }
.header h1 { font-size: 20px; margin: 0; color: white; }
.header p { font-size: 12px; margin: 0; color: rgba(255,255,255,0.9); }

/* GRID RESPONSIVO */
.container { 
  max-width: 1200px; margin: 0 auto; padding: 0 15px;
  display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; 
}

.card {
  background: white; border-radius: 15px; padding: 20px;
  box-shadow: var(--shadow); border: 1px solid rgba(212, 77, 125, 0.1);
  position: relative; display: flex; flex-direction: column;
}
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; color: var(--primary); }

/* LISTA E INPUTS */
#news-list { max-height: 300px; overflow-y: auto; margin-bottom: 10px; border: 1px inset var(--sakura); padding: 5px; }
.news-item {
  background: var(--sakura); padding: 10px; border-radius: 8px;
  margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-size: 12px;
}
input, textarea {
  width: 100%; padding: 10px; margin: 5px 0 15px 0;
  border: 2px solid #F0F0F0; border-radius: 8px; font-family: inherit; box-sizing: border-box;
}
textarea { height: 150px; resize: none; }

.btn {
  background: var(--primary); color: white; border: none;
  padding: 12px; border-radius: 10px; cursor: pointer;
  font-weight: 600; transition: 0.3s; width: 100%;
}
.btn:hover { transform: translateY(-2px); filter: brightness(1.1); }
.btn-check { background: #4CAF50; margin-top: 10px; }

.previa-box {
  width: 100%; min-height: 150px; background: #f9f9f9; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; overflow: hidden; margin-top: 10px;
  border: 2px dashed #ddd;
}
.previa-box img { max-width: 100%; height: auto; }

.mascote { position: absolute; top: 10px; right: 15px; font-size: 24px; opacity: 0.4; }

@media (max-width: 400px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div class="kurama-icon">🦊</div>
  <div>
    <h1>Tanaka News 🌸</h1>
    <p>Redação Esportiva da Duda</p>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">1️⃣ Buscar Matérias</div>
    <div id="news-list">
      <p style="text-align:center; color:#999; font-size:12px;">Toque no botão para invocar...</p>
    </div>
    <button class="btn" onclick="buscarMaterias()">⚡ Kuchiyose no Jutsu!</button>
    <div class="mascote">🐸</div>
  </div>

  <div class="card">
    <div class="card-title">2️⃣ Revisar Texto</div>
    <input type="text" id="edit-titulo" placeholder="Título da notícia...">
    <textarea id="edit-texto" placeholder="Conteúdo da matéria..."></textarea>
    <div class="mascote">🐶</div>
  </div>

  <div class="card">
    <div class="card-title">3️⃣ Foto (Ninpo)</div>
    <label style="font-size:12px;">Link da Imagem:</label>
    <input type="url" id="foto-url" placeholder="Cole o link .jpg ou .png aqui..." oninput="atualizarPrevia()">
    <div class="previa-box" id="previa-container">
      <span style="font-size:12px; color:#ccc;">Prévia da Foto 🖼️</span>
    </div>
    <div class="mascote">🐷</div>
  </div>

  <div class="card">
    <div class="card-title">4️⃣ Publicar</div>
    <p style="font-size:13px; color: #666;">Confira se o texto e a foto estão corretos antes de enviar para o portal.</p>
    <button class="btn btn-check" onclick="publicarNoticia()">🌸 Enviar para o NextSite</button>
    <div id="status-envio" style="margin-top:10px; font-size:12px; font-weight:bold; text-align:center;"></div>
    <div class="mascote">📜</div>
  </div>
</div>

<script>
const SERVER = 'https://duda-news-server.onrender.com';

async function buscarMaterias() {
  const container = document.getElementById('news-list');
  container.innerHTML = '<p style="text-align:center;">Invocando... 🌀</p>';
  try {
    const res = await fetch(`${SERVER}/materias`);
    const data = await res.json();
    container.innerHTML = '';
    data.materias.forEach(m => {
      container.innerHTML += `
        <div class="news-item">
          <span>${m.titulo.substring(0,35)}...</span>
          <button class="btn" style="width:auto; padding:5px 10px;" onclick="carregarMateria('${m.link}')">Abrir</button>
        </div>`;
    });
  } catch(e) { container.innerHTML = '<p>Erro ao conectar. ❌</p>'; }
}

async function carregarMateria(url) {
  const tit = document.getElementById('edit-titulo');
  const txt = document.getElementById('edit-texto');
  tit.value = "Carregando...";
  try {
    const res = await fetch(`${SERVER}/materia?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    tit.value = data.titulo;
    txt.value = data.texto;
  } catch(e) { tit.value = "Erro ao carregar."; }
}

function atualizarPrevia() {
  const url = document.getElementById('foto-url').value;
  const container = document.getElementById('previa-container');
  if(url) {
    container.innerHTML = `<img src="${url}" onerror="this.src='https://via.placeholder.com/150?text=Link+Invalido'">`;
  }
}

function publicarNoticia() {
  const status = document.getElementById('status-envio');
  status.style.color = "var(--primary)";
  status.innerHTML = "Enviando missão... 🕊️";
  
  // Aqui entraria sua lógica de POST para o NextSite
  setTimeout(() => {
    status.style.color = "#4CAF50";
    status.innerHTML = "✅ Publicado com sucesso!";
  }, 2000);
}
</script>
</body>
</html>

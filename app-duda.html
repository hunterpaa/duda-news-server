<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanaka News 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sakura: #FFF5F7;
  --primary: #D44D7D;
  --accent: #E0BBE4;
  --text: #4A5568;
  --shadow: 0 4px 15px rgba(212, 77, 125, 0.1);
}
body { font-family: 'Poppins', sans-serif; background: var(--sakura); color: var(--text); margin: 0; }

/* HEADER SLIM */
.header {
  background: linear-gradient(135deg, #FFB7C5 0%, var(--accent) 100%);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
  border-radius: 0 0 20px 20px;
}
.header-info { display: flex; align-items: center; gap: 12px; }
.kurama-icon { font-size: 40px; }
.header h1 { font-size: 18px; margin: 0; color: white; }
.header p { font-size: 11px; margin: 0; color: rgba(255,255,255,0.9); }

/* GRID PARA TELA CHEIA (PC) */
.container { 
  max-width: 1200px; margin: 20px auto; padding: 0 20px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
}
.card {
  background: white; border-radius: 15px; padding: 20px;
  box-shadow: var(--shadow); border: 1px solid rgba(212, 77, 125, 0.1);
  position: relative; min-height: 400px;
}
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

/* LISTA DE NOTÍCIAS */
.news-item {
  background: var(--sakura); padding: 12px; border-radius: 10px;
  margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
  border: 1px solid #eee; transition: 0.2s;
}
.news-item:hover { border-color: var(--primary); }
.news-title { font-size: 12px; font-weight: 600; flex: 1; padding-right: 10px; }

.btn {
  background: var(--primary); color: white; border: none;
  padding: 8px 15px; border-radius: 10px; cursor: pointer;
  font-weight: 600; font-size: 12px; transition: 0.3s;
}
.btn:disabled { background: #ccc; cursor: not-allowed; }

/* FORMULÁRIO */
input, textarea {
  width: 100%; padding: 12px; margin-top: 5px; margin-bottom: 15px;
  border: 2px solid #F0F0F0; border-radius: 8px; font-family: inherit; box-sizing: border-box;
}
textarea { height: 250px; resize: none; font-size: 13px; line-height: 1.6; }

.mascote { position: absolute; bottom: 10px; right: 10px; font-size: 40px; opacity: 0.3; pointer-events: none; }

@media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-info">
    <div class="kurama-icon">🦊</div>
    <div>
      <h1>Tanaka News 🌸</h1>
      <p>Redação da Duda-chan</p>
    </div>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">🐸 Invocação (Estadão)</div>
    <div id="news-list" style="max-height: 500px; overflow-y: auto;">
      <p style="text-align:center; font-size:13px; color:#999;">Aguardando comando... 🍥</p>
    </div>
    <button class="btn" id="btn-invocar" onclick="buscarMaterias()" style="width:100%; margin-top:10px;">⚡ Kuchiyose no Jutsu!</button>
    <div class="mascote">🐸</div>
  </div>

  <div class="card">
    <div class="card-title">🐶 Relatório (Revisão)</div>
    <div id="status-carga" style="font-size: 11px; color: var(--primary); font-weight: bold; margin-bottom: 5px;"></div>
    
    <label style="font-size:12px; font-weight:600;">Título do Pergaminho</label>
    <input type="text" id="edit-titulo" placeholder="O título aparecerá aqui...">
    
    <label style="font-size:12px; font-weight:600;">Texto da Missão</label>
    <textarea id="edit-texto" placeholder="O conteúdo da notícia aparecerá aqui..."></textarea>
    
    <button class="btn" style="width:100%; background: var(--accent); color: #6B46C1;">Próximo: Foto 📸</button>
    <div class="mascote">🐶</div>
  </div>
</div>

<script>
const SERVER = 'https://duda-news-server.onrender.com';

// FUNÇÃO 1: BUSCAR A LISTA DE MATÉRIAS
async function buscarMaterias() {
  const container = document.getElementById('news-list');
  const btn = document.getElementById('btn-invocar');
  
  btn.disabled = true;
  container.innerHTML = '<p style="text-align:center; font-size:13px;">Invocando matérias... 🌀</p>';
  
  try {
    const res = await fetch(`${SERVER}/materias`);
    const data = await res.json();
    
    container.innerHTML = '';
    if(data.materias && data.materias.length > 0) {
      data.materias.forEach(m => {
        // AQUI ESTÁ O SEGREDO: Adicionamos o onclick chamando carregarMateria com o link
        container.innerHTML += `
          <div class="news-item">
            <span class="news-title">${m.titulo}</span>
            <button class="btn" onclick="carregarMateria('${m.link}')">Abrir</button>
          </div>`;
      });
    } else {
      container.innerHTML = '<p>Nenhuma matéria encontrada. ❌</p>';
    }
  } catch(e) { 
    container.innerHTML = '<p>Erro na conexão ninja. Verifique o servidor. ❌</p>'; 
  } finally {
    btn.disabled = false;
  }
}

// FUNÇÃO 2: CARREGAR O CONTEÚDO DE UMA MATÉRIA ESPECÍFICA
async function carregarMateria(url) {
  const status = document.getElementById('status-carga');
  const txtTitulo = document.getElementById('edit-titulo');
  const txtCorpo = document.getElementById('edit-texto');
  
  status.innerHTML = "⌛ Lendo pergaminho...";
  txtTitulo.value = "Carregando...";
  txtCorpo.value = "Buscando texto completo, por favor aguarde...";

  try {
    const res = await fetch(`${SERVER}/materia?url=${encodeURIComponent(url)}`);
    const data = await res.json();
    
    if(data.ok) {
      txtTitulo.value = data.titulo;
      txtCorpo.value = data.texto;
      status.innerHTML = "✅ Conteúdo carregado!";
    } else {
      status.innerHTML = "❌ Erro ao extrair texto.";
    }
  } catch(e) {
    status.innerHTML = "❌ Erro de conexão.";
    txtTitulo.value = "";
    txtCorpo.value = "";
  }
}
</script>

</body>
</html>

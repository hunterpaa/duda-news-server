<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tanaka News 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --sakura: #FFF5F7;
  --primary: #D44D7D;
  --accent: #E0BBE4;
  --text: #4A5568;
  --shadow: 0 4px 15px rgba(212, 77, 125, 0.1);
}
body { font-family: 'Poppins', sans-serif; background: var(--sakura); color: var(--text); margin: 0; }

/* HEADER SLIM PARA PC */
.header {
  background: linear-gradient(135deg, #FFB7C5 0%, var(--accent) 100%);
  padding: 10px 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: var(--shadow);
  border-radius: 0 0 20px 20px;
}
.header-info { display: flex; align-items: center; gap: 12px; }
.kurama-icon { font-size: 40px; filter: drop-shadow(2px 2px 0px rgba(0,0,0,0.1)); }
.header h1 { font-size: 18px; margin: 0; color: white; }
.header p { font-size: 11px; margin: 0; color: rgba(255,255,255,0.9); }

/* ABAS */
.tabs { display: flex; gap: 10px; }
.tab {
  padding: 8px 16px; border-radius: 20px; border: none;
  background: white; color: var(--primary); font-weight: 600;
  cursor: pointer; transition: 0.2s; font-size: 13px;
}
.tab.active { background: var(--primary); color: white; }

/* GRID PARA TELA CHEIA */
.container { 
  max-width: 1200px; margin: 20px auto; padding: 0 20px;
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px; 
}
.card {
  background: white; border-radius: 15px; padding: 20px;
  box-shadow: var(--shadow); border: 1px solid rgba(212, 77, 125, 0.1);
  position: relative; overflow: hidden;
}
.card-title { font-size: 16px; font-weight: 700; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

/* CONTEÚDO */
.news-item {
  background: var(--sakura); padding: 10px; border-radius: 10px;
  margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;
  border: 1px solid #eee;
}
.news-title { font-size: 13px; font-weight: 500; }
.btn {
  background: var(--primary); color: white; border: none;
  padding: 8px 15px; border-radius: 10px; cursor: pointer;
  font-weight: 600; font-size: 13px; transition: 0.3s;
}
.btn:hover { opacity: 0.8; transform: translateY(-2px); }
.btn-secondary { background: var(--accent); color: #6B46C1; }

/* INPUTS */
input, textarea, select {
  width: 100%; padding: 10px; margin-top: 5px; margin-bottom: 15px;
  border: 2px solid #F0F0F0; border-radius: 8px; font-family: inherit;
}
textarea { height: 150px; resize: none; }

/* MASCOTES EMOJI-STYLE (Nunca quebram) */
.mascote { position: absolute; bottom: 10px; right: 10px; font-size: 40px; opacity: 0.5; }

@media (max-width: 800px) { .container { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<div class="header">
  <div class="header-info">
    <div class="kurama-icon">🦊</div>
    <div>
      <h1>Tanaka News 🌸</h1>
      <p>Redação da Duda-chan</p>
    </div>
  </div>
  <div class="tabs">
    <button class="tab active">📜 Missões</button>
    <button class="tab">⚙️ Config</button>
  </div>
</div>

<div class="container">
  <div class="card">
    <div class="card-title">🐸 Invocação (Estadão)</div>
    <div id="news-list">
      <p style="text-align:center; font-size:13px; color:#999;">Clique abaixo para carregar as matérias...</p>
    </div>
    <button class="btn" onclick="buscarMaterias()" style="width:100%">⚡ Kuchiyose no Jutsu!</button>
    <div class="mascote">🍥</div>
  </div>

  <div class="card">
    <div class="card-title">🐶 Relatório (Revisão)</div>
    <label style="font-size:12px;">Título do Pergaminho</label>
    <input type="text" id="edit-titulo" placeholder="Título da notícia...">
    <label style="font-size:12px;">Texto da Missão</label>
    <textarea id="edit-texto" placeholder="Conteúdo..."></textarea>
    <button class="btn btn-secondary" style="width:100%">Próximo: Foto 📸</button>
    <div class="mascote">🐶</div>
  </div>

  <div class="card">
    <div class="card-title">🐷 Foto (Ninpo)</div>
    <input type="url" id="foto-url" placeholder="Cole o link da foto aqui...">
    <div style="background:#f9f9f9; padding:10px; border-radius:10px; text-align:center; font-size:12px;">
       Prévia da Imagem aparecerá aqui 🖼️
    </div>
    <div class="mascote">🐷</div>
  </div>

  <div class="card">
    <div class="card-title">🏆 Missão Cumprida</div>
    <p style="font-size:13px; text-align:center;">Tudo pronto para publicar no NextSite!</p>
    <button class="btn" style="width:100%; padding:15px; font-size:16px;">🌸 Publicar Agora!</button>
    <div class="mascote">📜</div>
  </div>
</div>

<script>
// Mantive suas funções originais de busca e integração
async function buscarMaterias() {
  const container = document.getElementById('news-list');
  container.innerHTML = '<p style="text-align:center;">Invocando... 🌀</p>';
  try {
    const res = await fetch('https://duda-news-server.onrender.com/materias');
    const data = await res.json();
    container.innerHTML = '';
    data.materias.forEach(m => {
      container.innerHTML += `
        <div class="news-item">
          <span class="news-title">${m.titulo.substring(0,40)}...</span>
          <button class="btn" style="padding:5px 10px; font-size:11px;">Abrir</button>
        </div>`;
    });
  } catch(e) { container.innerHTML = '<p>Erro na conexão ninja. ❌</p>'; }
}
</script>

</body>
</html>
